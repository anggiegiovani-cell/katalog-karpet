<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneka Karpet Indah - Katalog Resmi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://i.ibb.co.com">
    <link rel="preload" as="image" href="https://i.ibb.co.com/Gv2LpsVy/Aneka-Karpet-Indah-logo-page-0001.jpg">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg:        #F5F0E8;
            --surface:   #FDFAF5;
            --border:    #DDD5C4;
            --text:      #3D2B1F;
            --muted:     #9B8B79;
            --accent:    #C4714A;
            --accent2:   #7A8C6E;
            --header-bg: #FDFAF5;
            --card-bg:   #FDFAF5;
            --shadow:    rgba(61,43,31,0.10);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding-bottom: 5rem;
            position: relative;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        main, header { position: relative; z-index: 1; }

        /* ── HEADER ── */
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }
        .header-inner { padding: 0.85rem 1rem 0.75rem; }
        .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.65rem; }
        .brand-tagline {
            font-size: 0.62rem; letter-spacing: 0.18em;
            color: var(--muted); text-transform: uppercase; margin-top: 0.15rem;
        }
        .ig-btn {
            width: 2.2rem; height: 2.2rem; border-radius: 50%;
            border: 1.5px solid var(--border); background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); transition: border-color 0.2s, color 0.2s; flex-shrink: 0;
            text-decoration: none;
        }
        .ig-btn:hover { border-color: #E1306C; color: #E1306C; }

        .search-wrap { position: relative; margin-bottom: 0; }
        .search-wrap input {
            width: 100%; padding: 0.58rem 1rem 0.58rem 2.4rem;
            border-radius: 999px; border: 1.5px solid var(--border);
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-wrap input::placeholder { color: var(--muted); }
        .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,113,74,0.12); }
        .search-wrap select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,113,74,0.12); outline: none; }
        .search-icon {
            position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
            color: var(--muted); width: 0.9rem; height: 0.9rem; pointer-events: none;
        }

        .filter-bar {
            display: flex; gap: 0.45rem;
            overflow-x: auto; padding: 0.65rem 1rem 0.75rem;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-btn {
            white-space: nowrap; padding: 0.3rem 1rem;
            border-radius: 999px; border: 1.5px solid var(--border);
            background: var(--surface); color: var(--muted);
            font-family: 'DM Sans', sans-serif; font-size: 0.68rem;
            font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── GRID ── */
        .katalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem; padding: 1rem;
            max-width: 960px; margin: 0 auto;
        }
        @media (min-width: 600px)  { .katalog-grid { grid-template-columns: repeat(3,1fr); } }
        @media (min-width: 900px)  { .katalog-grid { grid-template-columns: repeat(4,1fr); } }

        /* ── CARD ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 2px 8px var(--shadow);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            contain: layout style;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px var(--shadow); }

        .card-img-wrap {
            position: relative; aspect-ratio: 3/4; overflow: hidden;
            background-color: #E8E0D0;
        }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }

        .ukuran-overlay {
            display: flex; flex-wrap: wrap; gap: 0.28rem;
            margin-bottom: 0.45rem;
        }
        .ukuran-label {
            font-size: 0.58rem; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 0.28rem;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .ukuran-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .ukuran-btn {
            font-size: 0.6rem; padding: 0.25rem 0.55rem; border-radius: 0.35rem;
            background: var(--bg); border: 1.5px solid var(--border);
            color: var(--text); font-weight: 700; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
        }
        .ukuran-btn:hover:not(.selected) { border-color: var(--accent); color: var(--accent); }        .ukuran-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 1px 4px rgba(196,113,74,0.35); }

        .card-body { padding: 0.6rem 0.7rem 0.7rem; display: flex; flex-direction: column; flex: 1; }
        .card-koleksi {
            font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--accent); margin-bottom: 0.12rem;
        }
        .card-nama {
            font-family: 'Lora', serif; font-size: 0.78rem; font-weight: 600;
            line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 0.4rem; color: var(--text);
        }
        .card-footer {
            margin-top: auto; padding-top: 0.45rem;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
        }
        .card-price { font-family: 'Lora', serif; font-size: 0.82rem; font-weight: 600; color: var(--text); font-style: italic; }
        .card-stok  { font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .stok-ada   { color: var(--accent2); }
        .stok-habis { color: #e05252; }

        .wa-btn {
            width: 1.9rem; height: 1.9rem; border-radius: 0.5rem;
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none;
        }
        .wa-btn:hover { transform: scale(1.12); box-shadow: 0 2px 8px var(--shadow); }

        /* ── SKELETON ── */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, #f0ece4 50%, var(--border) 75%);
            background-size: 200% 100%; animation: shimmer 1.6s infinite;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── LAZY IMG ── */
        .lazy-img { opacity: 0; transition: opacity 0.3s ease; will-change: opacity; }
        .lazy-img.loaded { opacity: 1; will-change: auto; }

        /* ── MODAL ── */
        #modal-zoom {
            display: none; position: fixed; inset: 0;
            background: rgba(20,12,6,0.96); z-index: 100; cursor: zoom-out;
            align-items: center; justify-content: center;
        }
        #img-zoom { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 0.75rem; }

        .ornament { text-align: center; color: var(--accent); font-size: 1rem; letter-spacing: 0.4em; margin: 0.25rem 0 0; opacity: 0.4; }
        #status-text { text-align: center; color: var(--muted); font-size: 0.7rem; margin: 0.3rem 0 0.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="brand-row">
                <div>
                    <img src="https://i.ibb.co.com/Gv2LpsVy/Aneka-Karpet-Indah-logo-page-0001.jpg"
                         alt="Aneka Karpet Indah"
                         style="height:2.5rem;width:auto;object-fit:contain;display:block"
                         fetchpriority="high" decoding="async">
                    <p class="brand-tagline">CV. Aneka Karpet Indah</p>
                </div>
                <a href="https://www.instagram.com/anekakarpetjogja/" target="_blank" rel="noopener noreferrer"
                   class="ig-btn" aria-label="Instagram Aneka Karpet Indah">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <circle cx="12" cy="12" r="4"/>
                        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
                    </svg>
                </a>
            </div>
            <div class="search-wrap">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="search" id="search-input" placeholder="Cari merk atau motif..."
                       autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <!-- Ukuran filter -->
            <div class="search-wrap" style="margin-top:0.5rem">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:0.85rem;height:0.85rem">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
                </svg>
                <select id="ukuran-select" onchange="filterUkuran()"
                        style="appearance:none;-webkit-appearance:none;width:100%;padding:0.58rem 2rem 0.58rem 2.4rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.8rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;cursor:pointer">
                    <option value="">Semua Ukuran</option>
                </select>
                <svg style="position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);width:0.8rem;height:0.8rem;color:var(--muted);pointer-events:none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </div>
        </div>
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active">SEMUA</button>
        </div>
    </header>

    <main>
        <div class="katalog-grid" id="katalog-container">
            <div class="card"><div class="card-img-wrap skeleton" style="aspect-ratio:3/4"></div><div class="card-body" style="gap:0.4rem"><div class="skeleton" style="height:0.5rem;width:40%;border-radius:4px"></div><div class="skeleton" style="height:0.75rem;width:90%;border-radius:4px"></div><div class="skeleton" style="height:0.75rem;width:65%;border-radius:4px"></div><div class="skeleton" style="height:1rem;width:55%;border-radius:4px;margin-top:0.4rem"></div></div></div>
            <div class="card"><div class="card-img-wrap skeleton" style="aspect-ratio:3/4"></div><div class="card-body" style="gap:0.4rem"><div class="skeleton" style="height:0.5rem;width:40%;border-radius:4px"></div><div class="skeleton" style="height:0.75rem;width:90%;border-radius:4px"></div><div class="skeleton" style="height:0.75rem;width:65%;border-radius:4px"></div><div class="skeleton" style="height:1rem;width:55%;border-radius:4px;margin-top:0.4rem"></div></div></div>
        </div>
        <p class="ornament" id="ornament" style="display:none">— ✦ —</p>
        <p id="status-text" style="display:none"></p>

        <!-- Tombol Muat Lebih Banyak -->
        <div id="load-more-wrap" style="display:none; text-align:center; padding: 1rem 1rem 2rem;">
            <button id="load-more-btn" onclick="muatLebihBanyak()"
                    style="padding:0.65rem 2.2rem; background:var(--surface); color:var(--accent);
                           border: 1.5px solid var(--accent); border-radius:999px;
                           font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:700;
                           letter-spacing:0.06em; text-transform:uppercase; cursor:pointer;
                           transition: background 0.2s, color 0.2s;">
                Muat Lebih Banyak
            </button>
            <p id="load-more-info" style="margin-top:0.5rem; font-size:0.68rem; color:var(--muted);"></p>
        </div>
    </main>

    <div id="modal-zoom" onclick="closeZoom()" role="dialog" aria-modal="true">
        <img id="img-zoom" src="" alt="Zoom produk" loading="lazy" decoding="async">
    </div>

    <script>
        const SHEET_ID  = '1iLJWtfJntcjZalA7q-FFIUNe8BXGT40za7kMeELXfJk';
        const WA_NUMBER = '6287881807772';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        const CACHE_KEY = 'aki_katalog_v2';
        const CACHE_TTL = 5 * 60 * 1000;

        let semuaProduk = [], lazyObserver = null;
        let dataTampil = [];   // data yang sedang aktif (hasil filter/search)
        let halamanSaat = 0;   // halaman yang sudah ditampilkan
        const PER_HALAMAN = 24; // jumlah produk per batch

        const WA_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 48 48"><path fill="#25D366" d="M4.9 43.3l2.7-9.9C5.9 30.6 5 27.4 5 24 5 13.5 13.5 5 24 5s19 8.5 19 19-8.5 19-19 19c-3.2 0-6.2-.8-8.8-2.3L4.9 43.3z"/><path fill="#fff" d="M33.7 28.3c-.4-.2-2.3-1.1-2.6-1.3-.3-.1-.6-.2-.9.2-.3.4-1 1.3-1.3 1.5-.2.3-.5.3-.9.1-.4-.2-1.7-.6-3.2-2-1.2-1-2-2.3-2.2-2.7-.2-.4 0-.6.2-.8.2-.2.4-.5.6-.7.2-.2.2-.4.3-.7.1-.2 0-.5-.1-.7-.1-.2-1-2.3-1.3-3.1-.3-.8-.7-.7-1-.7h-.8c-.3 0-.7.1-1 .5s-1.4 1.4-1.4 3.3 1.4 3.8 1.6 4.1c.2.3 2.8 4.3 6.8 6 .9.4 1.7.6 2.2.8.9.3 1.8.2 2.4.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.6.2-1.8-.1-.2-.4-.3-.8-.5z"/></svg>`;

        function formatRupiah(n) { return parseInt(n).toLocaleString('id-ID'); }
        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

        document.getElementById('search-input').addEventListener('input', debounce(cariProduk, 250));

        async function ambilData() {
            try {
                const cached = sessionStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { ts, data } = JSON.parse(cached);
                    if (Date.now() - ts < CACHE_TTL) {
                        semuaProduk = data;
                        buatTombolFilter(); tampilkanKatalog(semuaProduk);
                        setStatus(`${semuaProduk.length} produk tersedia`); return;
                    }
                }
            } catch (_) {}

            try {
                const res  = await fetch(SHEET_URL);
                const txt  = await res.text();
                const json = JSON.parse(txt.substring(47, txt.length - 2));
                let tempGroup = {}, uid = 0;

                json.table.rows.forEach(row => {
                    if (!row.c[0]) return;
                    const koleksi = String(row.c[0].v);
                    const namaRaw = row.c[1] ? String(row.c[1].v).trim() : '';
                    const ukuran  = row.c[2] ? String(row.c[2].v) : '-';
                    const harga   = row.c[3] ? row.c[3].v : 0;
                    const stok    = row.c[4] ? row.c[4].v : 0;
                    const foto    = row.c[5] ? String(row.c[5].v) : '';
                    const isStandalone = namaRaw === '' || namaRaw === '-' || namaRaw.toLowerCase() === 'motif baru';
                    const id = isStandalone ? `standalone-${uid++}` : `${koleksi}-${namaRaw}`;
                    if (!tempGroup[id]) tempGroup[id] = { koleksi, nama: namaRaw || 'Motif Baru', fotoUtama: foto, variasi: [] };
                    const fotoFinal = (foto && foto !== '-') ? foto : tempGroup[id].fotoUtama;
                    tempGroup[id].variasi.push({ ukuran, harga, stok, foto: fotoFinal });
                });

                semuaProduk = Object.values(tempGroup);
                try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: semuaProduk })); } catch(_) {}
                buatTombolFilter(); tampilkanKatalog(semuaProduk);
                setStatus(`${semuaProduk.length} produk tersedia`);
            } catch (err) {
                document.getElementById('katalog-container').innerHTML =
                    `<p style="grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted);font-style:italic">Gagal memuat data. Coba refresh halaman.</p>`;
            }
        }

        function setStatus(msg) {
            document.getElementById('status-text').textContent = msg;
            document.getElementById('status-text').style.display = 'block';
            document.getElementById('ornament').style.display = 'block';
        }

        function tampilkanKatalog(data) {
            // Reset state pagination setiap kali filter/search berubah
            dataTampil   = data;
            halamanSaat  = 0;
            if (lazyObserver) lazyObserver.disconnect();

            const container = document.getElementById('katalog-container');
            if (!data.length) {
                container.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted);font-style:italic">Produk tidak ditemukan.</p>`;
                updateLoadMore();
                return;
            }

            container.innerHTML = '';
            renderBatch();
        }

        function renderBatch() {
            const container = document.getElementById('katalog-container');
            const mulai = halamanSaat * PER_HALAMAN;
            const batch = dataTampil.slice(mulai, mulai + PER_HALAMAN);

            // Hitung offset index agar id card unik antar batch
            const html = batch.map((item, i) => buatCardHTML(item, mulai + i)).join('');
            container.insertAdjacentHTML('beforeend', html);

            halamanSaat++;
            initLazyLoading();
            updateLoadMore();
        }

        function updateLoadMore() {
            const wrap = document.getElementById('load-more-wrap');
            const info = document.getElementById('load-more-info');
            const sudahTampil = Math.min(halamanSaat * PER_HALAMAN, dataTampil.length);
            const sisa = dataTampil.length - sudahTampil;

            if (sisa > 0) {
                wrap.style.display = 'block';
                info.textContent = `Menampilkan ${sudahTampil} dari ${dataTampil.length} produk`;
            } else {
                wrap.style.display = dataTampil.length > PER_HALAMAN ? 'block' : 'none';
                if (dataTampil.length > PER_HALAMAN) {
                    document.getElementById('load-more-btn').style.display = 'none';
                    info.textContent = `Semua ${dataTampil.length} produk sudah ditampilkan`;
                }
            }
        }

        function muatLebihBanyak() {
            renderBatch();
            // Scroll sedikit ke bawah agar customer tahu konten baru muncul
            const container = document.getElementById('katalog-container');
            const cards = container.querySelectorAll('.card');
            const cardBaru = cards[halamanSaat * PER_HALAMAN - PER_HALAMAN];
            if (cardBaru) cardBaru.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function buatCardHTML(item, idx) {
            const cid = `c${idx}`, def = item.variasi[0];
            const ukuranBtns = item.variasi.map((v, i) =>
                `<button class="ukuran-btn ${i===0?'selected':''}" onclick="updVar('${cid}','${v.ukuran}','${v.harga}','${v.stok}',this,'${v.foto}')">${v.ukuran}</button>`
            ).join('');
            return `
            <div class="card">
                <div class="card-img-wrap">
                    <img id="${cid}-img" class="lazy-img"
                         data-src="${def.foto}"
                         src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                         alt="${item.nama}" loading="lazy" decoding="async"
                         onclick="openZoom(this.src)"
                         onerror="this.src='https://placehold.co/400x500/e8e0d0/9b8b79?text=Foto+Error'">
                </div>
                <div class="card-body">
                    <p class="card-koleksi">${item.koleksi}</p>
                    <h3 class="card-nama">${item.nama}</h3>
                    ${item.variasi.length > 1 ? `
                    <div>
                        <p class="ukuran-label">Pilih Ukuran</p>
                        <div class="ukuran-overlay">${ukuranBtns}</div>
                    </div>` : `
                    <div class="ukuran-overlay">${ukuranBtns}</div>`}
                    <div class="card-footer">
                        <div>
                            <p id="${cid}-h" class="card-price">Rp ${formatRupiah(def.harga)}</p>
                            <span id="${cid}-s" class="card-stok ${def.stok!=0?'stok-ada':'stok-habis'}">● Stok: ${def.stok}</span>
                        </div>
                        <a id="${cid}-wa" href="${buildWaLink(item.koleksi,item.nama,def.ukuran,def.foto)}"
                           class="wa-btn" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">${WA_ICON}</a>
                    </div>
                </div>
            </div>`;
        }

        function buildWaLink(k, n, u, f) {
            // Encode setiap bagian secara terpisah agar karakter spesial di URL foto tidak merusak link
            const pesan = 'Halo Aneka Karpet Indah, saya mau tanya karpet '
                + k + ' ' + n + ' ukuran ' + u + '.\nFoto: ' + f;
            return 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(pesan);
        }

        function initLazyLoading() {
            lazyObserver = new IntersectionObserver((entries, obs) => {
                entries.forEach(e => {
                    if (!e.isIntersecting) return;
                    const img = e.target, src = img.getAttribute('data-src');
                    if (!src) return;
                    img.src = src;
                    img.onload  = () => img.classList.add('loaded');
                    img.onerror = () => { img.src='https://placehold.co/400x500/e8e0d0/9b8b79?text=Foto+Error'; img.classList.add('loaded'); };
                    obs.unobserve(img);
                });
            }, { rootMargin: '200px 0px' });
            document.querySelectorAll('.lazy-img').forEach(img => lazyObserver.observe(img));
        }

        function updVar(cid, u, h, s, btn, f) {
            const img = document.getElementById(`${cid}-img`);
            img.classList.remove('loaded'); img.src = f;
            img.onload  = () => img.classList.add('loaded');
            img.onerror = () => { img.src='https://placehold.co/400x500/e8e0d0/9b8b79?text=Foto+Error'; img.classList.add('loaded'); };

            document.getElementById(`${cid}-h`).textContent = `Rp ${formatRupiah(h)}`;
            const sel = document.getElementById(`${cid}-s`);
            sel.textContent = `● Stok: ${s}`;
            sel.className = `card-stok ${s != 0 ? 'stok-ada' : 'stok-habis'}`;

            const card = btn.closest('.card');
            const kol  = card.querySelector('.card-koleksi').textContent.trim();
            const nam  = card.querySelector('.card-nama').textContent.trim();
            document.getElementById(`${cid}-wa`).href = buildWaLink(kol, nam, u, f);

            btn.closest('.ukuran-overlay').querySelectorAll('.ukuran-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function buatTombolFilter() {
            const bar = document.getElementById('filter-bar'), frag = document.createDocumentFragment();
            const all = document.createElement('button');
            all.textContent='SEMUA'; all.className='filter-btn active';
            all.onclick = e => filterKoleksi('Semua', e.currentTarget); frag.appendChild(all);
            [...new Set(semuaProduk.map(p=>p.koleksi))].forEach(k => {
                const btn = document.createElement('button');
                btn.textContent=k.toUpperCase(); btn.className='filter-btn';
                btn.onclick = e => filterKoleksi(k, e.currentTarget); frag.appendChild(btn);
            });
            bar.innerHTML=''; bar.appendChild(frag);

            // Isi dropdown ukuran dari semua variasi yang ada
            const semuaUkuran = [...new Set(
                semuaProduk.flatMap(p => p.variasi.map(v => v.ukuran))
            )].filter(u => u && u !== '-').sort();
            const sel = document.getElementById('ukuran-select');
            sel.innerHTML = '<option value="">Semua Ukuran</option>';
            semuaUkuran.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u; opt.textContent = u;
                sel.appendChild(opt);
            });
        }

        function getFilteredData() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            const ukuran  = document.getElementById('ukuran-select').value;
            const koleksiBtn = document.querySelector('.filter-btn.active');
            const koleksi = koleksiBtn ? koleksiBtn.textContent.trim() : 'SEMUA';

            return semuaProduk.filter(p => {
                const matchKoleksi = koleksi === 'SEMUA' || p.koleksi.toUpperCase() === koleksi;
                const matchKeyword = !keyword || p.nama.toLowerCase().includes(keyword) || p.koleksi.toLowerCase().includes(keyword);
                const matchUkuran  = !ukuran  || p.variasi.some(v => v.ukuran === ukuran);
                return matchKoleksi && matchKeyword && matchUkuran;
            });
        }

        function filterKoleksi(kat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            const result = getFilteredData();
            document.getElementById('load-more-btn').style.display = 'inline-block';
            tampilkanKatalog(result);
            setStatus(`${result.length} produk ditemukan`);
        }

        function cariProduk() {
            const keyword = document.getElementById('search-input').value.trim();

            // Opsi D: auto-reset filter koleksi jika ada keyword, tampilkan toast
            const filterAktif = document.querySelector('.filter-btn.active');
            const namaFilter = filterAktif ? filterAktif.textContent.trim() : 'SEMUA';
            if (keyword && namaFilter !== 'SEMUA') {
                // Reset semua filter ke SEMUA
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.filter-btn').classList.add('active');
                tampilkanToast('Filter koleksi direset otomatis');
            }

            const result = getFilteredData();
            document.getElementById('load-more-btn').style.display = 'inline-block';
            tampilkanKatalog(result);
            setStatus(keyword ? `${result.length} produk ditemukan untuk "${keyword}"` : `${result.length} produk tersedia`);
        }

        function filterUkuran() {
            const result = getFilteredData();
            document.getElementById('load-more-btn').style.display = 'inline-block';
            tampilkanKatalog(result);
            const ukuran = document.getElementById('ukuran-select').value;
            setStatus(ukuran ? `${result.length} produk ukuran "${ukuran}"` : `${result.length} produk tersedia`);
        }

        function openZoom(s) { document.getElementById('img-zoom').src=s; document.getElementById('modal-zoom').style.display='flex'; document.body.style.overflow='hidden'; }
        function closeZoom() { document.getElementById('modal-zoom').style.display='none'; document.body.style.overflow=''; }
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeZoom(); });

        // Toast notifikasi
        function tampilkanToast(pesan) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(20px);
                    background:var(--text); color:var(--bg); padding:0.55rem 1.1rem;
                    border-radius:999px; font-size:0.72rem; font-weight:600;
                    font-family:'DM Sans',sans-serif; z-index:200; opacity:0;
                    transition:opacity 0.25s ease, transform 0.25s ease;
                    white-space:nowrap; pointer-events:none;
                `;
                document.body.appendChild(toast);
            }
            toast.textContent = pesan;
            // Paksa reflow agar transisi berjalan
            toast.offsetHeight;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2500);
        }

        ambilData();
    </script>
</body>
</html>
